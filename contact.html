<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Contact | Madhav</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- BOXICONS -->
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f8fafc;
      color:#334155;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      position:fixed;
      top:0;
      width:100%;

      padding:20px 10%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(12px);

      border-bottom:1px solid #ecd5e3;

      z-index:1000;

      box-shadow:0 5px 20px rgba(0,0,0,0.04);
    }

    .logo{
      font-size:28px;
      font-weight:700;
      color:#7c3aed;
    }

    nav ul{
      display:flex;
      gap:30px;
      list-style:none;
    }

    nav ul li a{
      color:#475569;
      font-weight:500;
      transition:0.3s ease;
      position:relative;
    }

    nav ul li a::after{
      content:"";
      position:absolute;

      left:0;
      bottom:-5px;

      width:0%;
      height:2px;

      background:#a855f7;

      transition:0.3s ease;
    }

    nav ul li a:hover::after{
      width:100%;
    }

    nav ul li a:hover,
    nav ul li .active{
      color:#a855f7;
    }

    /* ================= CONTACT SECTION ================= */

    .contact-section{
      min-height:100vh;

      padding:140px 10% 80px;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(
      135deg,
      #FEE1E8 0%,
      #F8FAFC 45%,
      #C6DBDA 100%
      );
    }

    /* ================= CONTACT CONTAINER ================= */

    .contact-container{
      width:100%;
      max-width:750px;

      background:rgba(255,255,255,0.72);

      padding:55px;

      border-radius:35px;

      backdrop-filter:blur(14px);

      border:1px solid rgba(255,255,255,0.8);

      box-shadow:
      0 20px 45px rgba(0,0,0,0.06);

      position:relative;

      overflow:hidden;

      text-align:center;

      animation:fadeUp 1s ease;
    }

    .contact-container::before{
      content:"";

      position:absolute;

      width:240px;
      height:240px;

      background:rgba(192,132,252,0.16);

      border-radius:50%;

      top:-90px;
      right:-90px;

      z-index:0;
    }

    .contact-container *{
      position:relative;
      z-index:1;
    }

    /* ================= HEADING ================= */

    .contact-container h2{
      font-size:48px;

      color:#1e293b;

      margin-bottom:18px;
    }

    .contact-container p{
      font-size:17px;

      color:#64748b;

      line-height:1.8;

      margin-bottom:40px;
    }

    /* ================= CONTACT BOXES ================= */

    .contact-info{
      display:flex;
      flex-direction:column;

      gap:22px;

      margin-bottom:40px;
    }

    .contact-box{
      background:white;

      padding:24px 28px;

      border-radius:22px;

      text-align:left;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.05);

      transition:0.3s ease;
    }

    .contact-box:hover{
      transform:translateY(-5px);

      box-shadow:
      0 15px 30px rgba(168,85,247,0.12);
    }

    .contact-box h3{
      font-size:20px;

      color:#7c3aed;

      margin-bottom:8px;

      display:flex;
      align-items:center;

      gap:10px;
    }

    .contact-box a{
      color:#475569;

      font-size:15px;

      word-break:break-word;
    }

    /* ================= SOCIAL ICONS ================= */

    .social-icons{
      display:flex;
      justify-content:center;

      gap:18px;
    }

    .social-icons a{
      width:58px;
      height:58px;

      border-radius:18px;

      background:white;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:28px;

      color:#7c3aed;

      transition:0.3s ease;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.05);
    }

    .social-icons a:hover{
      transform:translateY(-6px) scale(1.08);

      box-shadow:
      0 15px 30px rgba(168,85,247,0.18);
    }

    /* ================= ANIMATION ================= */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      .contact-section{
        padding:120px 6% 60px;
      }

      .contact-container{
        padding:40px 25px;
      }

      .contact-container h2{
        font-size:38px;
      }

      .contact-container p{
        font-size:15px;
      }

      nav ul{
        gap:18px;
      }

    }

  </style>

</head>

<body>

      <!-- SOCIAL ICONS -->

      <div class="social-icons">

        <a href="mailto:lakhotiamadhav3@gmail.com" target="_blank">

        </a>

        <a href="https://github.com/madhav-lakhotia" target="_blank">

        </a>

        <a href="https://www.linkedin.com/in/madhav-lakhotia-5b43b432a" target="_blank">

    </div>

  </section>

</body>
</html>
