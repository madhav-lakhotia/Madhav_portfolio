<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Madhav | Skills</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- BOXICONS -->
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f8fafc;
      color:#334155;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      position:fixed;
      top:0;
      width:100%;

      padding:20px 10%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(12px);

      border-bottom:1px solid #ecd5e3;

      z-index:1000;

      box-shadow:0 5px 20px rgba(0,0,0,0.04);
    }

    .logo{
      font-size:28px;
      font-weight:700;
      color:#7c3aed;
    }

    nav ul{
      display:flex;
      gap:30px;
      list-style:none;
    }

    nav ul li a{
      color:#475569;
      font-weight:500;
      transition:0.3s ease;
      position:relative;
    }

    nav ul li a::after{
      content:"";
      position:absolute;

      left:0;
      bottom:-5px;

      width:0%;
      height:2px;

      background:#a855f7;

      transition:0.3s ease;
    }

    nav ul li a:hover::after{
      width:100%;
    }

    nav ul li a:hover,
    nav ul li .active{
      color:#a855f7;
    }

    /* ================= SKILLS SECTION ================= */

    .skills{
      min-height:100vh;

      padding:140px 10% 80px;

      background:
      linear-gradient(
      135deg,
      #FEE1E8 0%,
      #F8FAFC 45%,
      #C6DBDA 100%
      );
    }

    .skills h2{
      text-align:center;

      font-size:48px;

      color:#1e293b;

      margin-bottom:60px;

      animation:fadeDown 1s ease;
    }

    .skills-container{
      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:28px;
    }

    /* ================= SKILL CARD ================= */

    .skill-card{
      background:rgba(255,255,255,0.78);

      border-radius:26px;

      padding:35px 25px;

      border:1px solid rgba(255,255,255,0.7);

      box-shadow:
      0 12px 30px rgba(0,0,0,0.06);

      text-align:center;

      transition:0.35s ease;

      position:relative;

      overflow:hidden;

      animation:fadeUp 1s ease;
    }

    .skill-card::before{
      content:"";

      position:absolute;

      width:160px;
      height:160px;

      background:rgba(192,132,252,0.12);

      border-radius:50%;

      top:-60px;
      right:-60px;

      z-index:0;
    }

    .skill-card *{
      position:relative;
      z-index:1;
    }

    .skill-card:hover{
      transform:translateY(-10px);

      box-shadow:
      0 20px 40px rgba(124,58,237,0.12);
    }

    .skill-card i{
      font-size:48px;

      color:#7c3aed;

      margin-bottom:18px;

      transition:0.3s ease;
    }

    .skill-card:hover i{
      transform:scale(1.1);
    }

    .skill-card h3{
      font-size:20px;

      color:#334155;

      font-weight:600;
    }

    /* ================= ANIMATIONS ================= */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes fadeDown{

      from{
        opacity:0;
        transform:translateY(-30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      .skills{
        padding:120px 6% 60px;
      }

      .skills h2{
        font-size:38px;
      }

      .skills-container{
        gap:22px;
      }

      .skill-card{
        padding:30px 20px;
      }

      .skill-card h3{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <header class="navbar">

    <div class="logo">Madhav</div>

    <nav>

      <ul>
        <li><a href="./index.html">Home</a></li>
        <li><a href="./skills.html" class="active">Skills</a></li>
        <li><a href="./projects.html">Projects</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>

    </nav>

  </header>

  <!-- ================= SKILLS SECTION ================= -->

  <section class="skills">

    <h2>My Skills</h2>

    <div class="skills-container">

      <div class="skill-card">
        <i class='bx bxl-html5'></i>
        <h3>HTML, CSS , JS </h3>
      </div>

      <div class="skill-card">
        <i class='bx bxl-css3'></i>
        <h3>Excel</h3>
      </div>

      <div class="skill-card">
        <i class='bx bxl-javascript'></i>
        <h3>JavaScript</h3>
      </div>

      <div class="skill-card">
        <i class='bx bxl-python'></i>
        <h3>Data analysis</h3>
      </div>

      <div class="skill-card">
        <i class='bx bx-brain'></i>
        <h3>Python(Pandas, Numpy, Matplotlib, Seaborn)</h3>
      </div>

      <div class="skill-card">
        <i class='bx bx-code-alt'></i>
        <h3>Java</h3>
      </div>

      <div class="skill-card">
        <i class='bx bx-data'></i>
        <h3>SQL </h3>
      </div>

      <div class="skill-card">
        <i class='bx bx-slideshow'></i>
        <h3>MS Word & PowerPoint</h3>
      </div>

      <div class="skill-card">
        <i class='bx bx-terminal'></i>
        <h3>C Programming</h3>
      </div>

    </div>

  </section>

</body>
</html>
