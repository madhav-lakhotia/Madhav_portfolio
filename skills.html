<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madhav | Skills</title>
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .navbar {
      position: fixed;
      width: 100%;
      background: #1e293b;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
    }

    .navbar nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .navbar nav ul li a {
      color: #cbd5e1;
      font-weight: 500;
      transition: 0.3s;
    }

    .navbar nav ul li a:hover,
    .navbar nav ul li .active {
      color: #38bdf8;
    }

    .skills {
      padding: 120px 10% 60px;
      min-height: 100vh;
      background-color: #0f172a;
      text-align: center;
    }

    .skills h2 {
      font-size: 36px;
      margin-bottom: 40px;
      color: #38bdf8;
    }

    .skills-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 30px;
    }

    .skill-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
      transition: transform 0.3s, background 0.3s;
    }

    .skill-card:hover {
      transform: translateY(-8px);
      background: #334155;
    }

    .skill-card i {
      font-size: 40px;
      color: #facc15;
      margin-bottom: 10px;
    }

    .skill-card h3 {
      font-size: 18px;
      color: #fff;
    }

    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Madhav.dev</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="skills.html" class="active">Skills</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Skills Section -->
  <section class="skills">
    <h2>My Skills</h2>
    <div class="skills-container">
      <div class="skill-card"><i class='bx bxl-html5'></i><h3>HTML5</h3></div>
      <div class="skill-card"><i class='bx bxl-css3'></i><h3>CSS3</h3></div>
      <div class="skill-card"><i class='bx bxl-javascript'></i><h3>JavaScript</h3></div>
      <div class="skill-card"><i class='bx bxl-python'></i><h3>Python</h3></div>
      <div class="skill-card"><i class='bx bxs-brain'></i><h3>AI & ML Basics</h3></div>
      <div class="skill-card"><i class='bx bx-code-alt'></i><h3>Problem Solving</h3></div>
      <div class="skill-card"><i class='bx bx-data'></i><h3>SQL Basics</h3></div>
      <div class="skill-card"><i class='<span><i class='bx bx-file'></i></span>
        <span><i class='bx bx-slideshow'></i> </span>
        <h3>MS Word + Power Point</h3></div>
<div class="skill-card">
  <i class='bx bx-code-alt'></i>
  <h3>C Language</h3>
</div>

    </div>
  </section>
</body>
</html>
